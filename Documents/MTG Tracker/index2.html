<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Game Tracker</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
        line-height: 1.5;
      }

      h1 {
        color: #1a1a1a;
        margin-bottom: 28px;
      }

      fieldset {
        border: none;

      legend {

      }

      label {
        display: block;

      }

      input[type="text"],
      input[type="date"],

        width: 100%;

        border: 1px solid #d0d0d0;
        border-radius: 6px;
        font-size: 0.95rem;

        transition: border-color 0.2s;
      }

      input[type="date"] {
        max-width: 280px;
      }

      input[type="text"]:focus,

        outline: none;
        border-color: #0066cc;
        box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 12px;
        margin-right: 8px;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      button:active {
        transform: translateY(0);
      }

      #save-game {
        background: #0066cc;
        color: white;
        font-weight: 600;
      }

      #save-game:hover {
        background: #0052a3;
      }

      #clear-game,

      }

      #clear-game:hover,

      }

      .secondary {

      }

      .secondary:hover {
        background: #e8e8e8;
      }

      table {
        width: 100%;

        margin-bottom: 20px;
      }

      th, td {
        border: 1px solid #ddd;

      }

      th {
        background: #f9f9f9;
        font-weight: 600;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      }

      .player-grid {
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      .player-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
      }

      .player-row:hover {

      .player-row strong {

     .commander-portrait {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 0;

    margin-bottom: 0;

}

.commander-display {
    position: relative;

}

.commander-name-display {

    padding: 12px;

}

     .commander-portrait-preview {
    width: 100%;

    background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);

    align-items: center;

      .history-card-portrait {

      .history-actions {

      }

      .history-actions button {
        font-size: 0.85rem;
        padding: 10px 14px;
        margin: 0;
        flex: 1 1 130px;
        border-radius: 8px;
      }

      .history-card-content {
        display: grid;

      }

      .history-card-header {

     .commander-portrait {

  <body>
    <h1>MTG Game Tracker</h1>

    <fieldset>
      <legend>New Game</legend>
      <div class="grid">
        <div>
          <label for="game-date">Game Date</label>
          <input type="date" id="game-date" name="game-date">
        </div>
      </div>

      <div>
        <h2 style="margin-top: 20px; margin-bottom: 12px; font-size: 1rem; color: #1a1a1a;">Enter Seat Positions & Commanders
</h2>
        <div class="grid player-grid">
          <div class="player-row">
            <div class="player-row-inputs">
              <strong>First</strong>
              <label for="player-first-name">Player Name</label>
              <input type="text" id="player-first-name" placeholder="Player name" list="player-first-names-list">
              <label for="commander-first">Commander</label>
              <input type="text" id="commander-first" placeholder="Commander" list="commanders-first-list" style="margin-bottom: 8px;">
              <label style="margin-bottom: 4px; font-size: 0.85rem;">Upload:</label>
              <input type="file" id="image-first" accept="image/*" style="margin-bottom: 12px; font-size: 0.8rem;">
              <label><input type="radio" name="winner" value="first" checked> Winner</label>
            </div>
            <div class="player-row-portrait">
              <div id="portrait-first" class="commander-portrait-preview">📷</div>
            </div>
          </div>

          <div class="player-row">
            <div class="player-row-inputs">
              <strong>Second</strong>
              <label for="player-second-name">Player Name</label>
              <input type="text" id="player-second-name" placeholder="Player name" list="player-second-names-list">
              <label for="commander-second">Commander</label>
              <input type="text" id="commander-second" placeholder="Commander" list="commanders-second-list" style="margin-bottom: 8px;">
              <label style="margin-bottom: 4px; font-size: 0.85rem;">Upload:</label>
              <input type="file" id="image-second" accept="image/*" style="margin-bottom: 12px; font-size: 0.8rem;">
              <label><input type="radio" name="winner" value="second"> Winner</label>
            </div>
            <div class="player-row-portrait">
              <div id="portrait-second" class="commander-portrait-preview">📷</div>
            </div>
          </div>

          <div class="player-row">
            <div class="player-row-inputs">
              <strong>Third</strong>
              <label for="player-third-name">Player Name</label>
              <input type="text" id="player-third-name" placeholder="Player name" list="player-third-names-list">
              <label for="commander-third">Commander</label>
              <input type="text" id="commander-third" placeholder="Commander" list="commanders-third-list" style="margin-bottom: 8px;">
              <label style="margin-bottom: 4px; font-size: 0.85rem;">Upload:</label>
              <input type="file" id="image-third" accept="image/*" style="margin-bottom: 12px; font-size: 0.8rem;">
              <label><input type="radio" name="winner" value="third"> Winner</label>
            </div>
            <div class="player-row-portrait">
              <div id="portrait-third" class="commander-portrait-preview">📷</div>
            </div>
          </div>

          <div class="player-row">
            <div class="player-row-inputs">
              <strong>Last</strong>
              <label for="player-last-name">Player Name</label>
              <input type="text" id="player-last-name" placeholder="Player name" list="player-last-names-list">
              <label for="commander-last">Commander</label>
              <input type="text" id="commander-last" placeholder="Commander" list="commanders-last-list" style="margin-bottom: 8px;">
              <label style="margin-bottom: 4px; font-size: 0.85rem;">Upload:</label>
              <input type="file" id="image-last" accept="image/*" style="margin-bottom: 12px; font-size: 0.8rem;">
              <label><input type="radio" name="winner" value="last"> Winner</label>
            </div>
            <div class="player-row-portrait">
              <div id="portrait-last" class="commander-portrait-preview">📷</div>
            </div>
          </div>
        </div>
      </div>

      <div id="edit-mode" style="margin-bottom: 12px; display:none; font-weight:700; color:#0a58ca;"></div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;">
        <button id="save-game">Save Game</button>
        <button id="cancel-edit" class="secondary" style="display:none;">Cancel Edit</button>
        <button id="clear-game">Clear Current Game</button>
      </div>
    </fieldset>
    
    <fieldset>
      <legend>Game History</legend>
      <p style="margin-top: 0; margin-bottom: 16px; color: #666; font-size: 0.95rem;">View and manage past games</p>
      <div id="game-history-list" class="history-grid"></div>
    </fieldset>

    <fieldset>
      <legend>Statistics</legend>
      <p style="margin-top: 0; margin-bottom: 16px; color: #666; font-size: 0.95rem;">Win rates and performance metrics</p>
      <div id="stats-summary"></div>
      <div id="stats-tables"></div>
    </fieldset>

    <datalist id="player-first-names-list"></datalist>
    <datalist id="player-second-names-list"></datalist>
    <datalist id="player-third-names-list"></datalist>
    <datalist id="player-last-names-list"></datalist>
    <datalist id="commanders-first-list"></datalist>
    <datalist id="commanders-second-list"></datalist>
    <datalist id="commanders-third-list"></datalist>
    <datalist id="commanders-last-list"></datalist>

    <fieldset>
      <legend>Commander Library</legend>
      <p style="margin-top: 0; margin-bottom: 12px; color: #666; font-size: 0.95rem;">Scroll through your commander collection</p>
      <div id="commander-library"></div>
    </fieldset>

    <script>
      const STORAGE_KEY = 'mtgGameTracker.games';
      const IMAGES_KEY = 'mtgGameTracker.commanderImages';
      let currentGame = { date: null, players: [], index: null };
      let games = [];
      let commanderImages = {};
      let pendingPortraits = {};
      function loadGames() {
        const stored = localStorage.getItem(STORAGE_KEY);
        games = stored ? JSON.parse(stored) : [];
        const storedImages = localStorage.getItem(IMAGES_KEY);
        commanderImages = storedImages ? JSON.parse(storedImages) : {};
        populateDataLists();
        renderCommanderLibrary();
        renderGameHistory();
        renderStats();
      }

      function saveCommanderImages() {
        localStorage.setItem(IMAGES_KEY, JSON.stringify(commanderImages));
      }
async function fetchCommanderImage(commanderName) {
  if (!commanderName) return null;

  try {
    const response = await fetch(
      `https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(commanderName)}`
    );

    if (!response.ok) {
      console.error('Commander not found:', commanderName);
      return null;
    }

    const card = await response.json();

    let imageUrl = null;

    if (card.image_uris) {
      imageUrl = card.image_uris.art_crop;
    } else if (
      card.card_faces &&
      card.card_faces[0] &&
      card.card_faces[0].image_uris
    ) {
      imageUrl = card.card_faces[0].image_uris.art_crop;
    }

    if (!imageUrl) return null;

    commanderImages[commanderName] = imageUrl;
    saveCommanderImages();

    return imageUrl;
  } catch (error) {
    console.error(error);
    return null;
  }
}
      function renderCommanderLibrary() {
        const library = document.getElementById('commander-library');
        const commanders = Object.keys(commanderImages).sort();
        
        if (commanders.length === 0) {
          library.innerHTML = '<p style=\"grid-column: 1/-1; color: #999;\">No commanders yet. Upload a portrait to get started!</p>';
          return;
        }

        library.innerHTML = commanders.map(name => `
          <div class="commander-card">
            <img src="${commanderImages[name]}" alt="${name}">
            <div class="commander-card-name">${name}</div>
            <button class="delete-commander-image secondary" data-commander="${name}">Delete</button>
          </div>
        `).join('');
      }

      function updatePortraitPreview(position) {
        const commanderField = document.getElementById(`commander-${position}`);
        const portraitDiv = document.getElementById(`portrait-${position}`);
        const commanderName = commanderField.value.trim();
        const pending = pendingPortraits[position];

        if (commanderName && commanderImages[commanderName]) {
  portraitDiv.innerHTML = `
    <div class="commander-display">
      <img
        src="${commanderImages[commanderName]}"
        alt="${commanderName}"
        class="commander-portrait"
      >
      <div class="commander-name-display">
        ${commanderName}
      </div>
    </div>
  `;

        } else if (pending && pending.data && pending.commander === commanderName) {
          portraitDiv.innerHTML = `<img src="${pending.data}" alt="Pending portrait" class="commander-portrait">`;
        } else {
          portraitDiv.innerHTML = '📷';
        }
      }

      function getCommanderOptionsForPlayer(playerName, map, globalOptions) {
        if (playerName && map[playerName]) {
          return Array.from(map[playerName])
            .sort()
            .map(cmd => `<option value="${cmd}">`)
            .join('');
        }
        return globalOptions;
      }

      function populatePlayerDataLists() {
        const playerNames = new Set();

        games.forEach(game => {
          game.players.forEach(player => {
            if (player.name) playerNames.add(player.name);
          });
        });

        const playerOptions = Array.from(playerNames)
          .sort()
          .map(name => `<option value="${name}">`)
          .join('');

        document.getElementById('player-first-names-list').innerHTML = playerOptions;
        document.getElementById('player-second-names-list').innerHTML = playerOptions;
        document.getElementById('player-third-names-list').innerHTML = playerOptions;
        document.getElementById('player-last-names-list').innerHTML = playerOptions;
      }

      function populateCommanderDataLists() {
        const commanders = new Set();
        const playerCommanderMap = {};

        games.forEach(game => {
          game.players.forEach(player => {
            if (player.commander) commanders.add(player.commander);
            if (player.name && player.commander) {
              if (!playerCommanderMap[player.name]) {
                playerCommanderMap[player.name] = new Set();
              }
              playerCommanderMap[player.name].add(player.commander);
            }
          });
        });

        const globalCommanderOptions = Array.from(commanders)
          .sort()
          .map(cmd => `<option value="${cmd}">`)
          .join('');

        document.getElementById('commanders-first-list').innerHTML = getCommanderOptionsForPlayer(
          document.getElementById('player-first-name').value.trim(),
          playerCommanderMap,
          globalCommanderOptions
        );
        document.getElementById('commanders-second-list').innerHTML = getCommanderOptionsForPlayer(
          document.getElementById('player-second-name').value.trim(),
          playerCommanderMap,
          globalCommanderOptions
        );
        document.getElementById('commanders-third-list').innerHTML = getCommanderOptionsForPlayer(
          document.getElementById('player-third-name').value.trim(),
          playerCommanderMap,
          globalCommanderOptions
        );
        document.getElementById('commanders-last-list').innerHTML = getCommanderOptionsForPlayer(
          document.getElementById('player-last-name').value.trim(),
          playerCommanderMap,
          globalCommanderOptions
        );
      }

      function populateDataLists() {
        populatePlayerDataLists();
        populateCommanderDataLists();
      }

      function saveGames() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(games));
      }

      function getSeatPlayers() {
        const seats = [
          { position: 'first', nameId: 'player-first-name', commanderId: 'commander-first' },
          { position: 'second', nameId: 'player-second-name', commanderId: 'commander-second' },
          { position: 'third', nameId: 'player-third-name', commanderId: 'commander-third' },
          { position: 'last', nameId: 'player-last-name', commanderId: 'commander-last' }
        ];

        return seats.map(seat => {
          return {
            position: seat.position,
            name: document.getElementById(seat.nameId).value.trim(),
            commander: document.getElementById(seat.commanderId).value.trim(),
            isWinner: document.querySelector(`input[name="winner"]:checked`).value === seat.position
          };
        });
      }

      function renderGameHistory() {
        const container = document.getElementById('game-history-list');
        container.innerHTML = '';

        if (games.length === 0) {
          container.innerHTML = '<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: #999;">No games recorded yet. Start a new game to get started!</div>';
          return;
        }

        const recentGames = games.slice(-5);
        recentGames.reverse().forEach((game, reversedIndex) => {
          const index = games.length - 1 - reversedIndex;
          const winner = game.players.find(p => p.isWinner);

          const card = document.createElement('div');
          card.className = 'history-card';

          const playersHtml = game.players.map(player => {
            const isWinner = player.isWinner ? ' winner' : '';
            const medal = player.isWinner ? '🏆' : '';
            const img = commanderImages[player.commander];
            const portraitHtml = img ? `<img src="${img}" alt="${player.commander}">` : '📷';
            return `
              <div class="history-player${isWinner}">
                <div class="history-player-portrait">${portraitHtml}</div>
                <div class="history-player-info">
                  <div class="history-player-position">${player.position}</div>
                  <div class="history-player-name">${player.name}${medal ? ' ' + medal : ''}</div>
                  <div class="history-player-commander">${player.commander}</div>
                </div>
              </div>
            `;
          }).join('');

          card.innerHTML = `
            <div class="history-card-content">
              <div class="history-card-header">
                <h3>${game.date}</h3>
                <div class="history-card-winner">${winner ? winner.name : 'N/A'}</div>
              </div>
              <div class="history-card-players">
                ${playersHtml}
              </div>
              <div class="history-actions">
                <button class="edit-game secondary" data-index="${index}">Edit</button>
                <button class="delete-game secondary" data-index="${index}">Delete</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      }

      function renderStats() {
        const summary = document.getElementById('stats-summary');
        const tables = document.getElementById('stats-tables');

        if (!games.length) {
          summary.innerHTML = '<p>No games saved yet.</p>';
          tables.innerHTML = '';
          return;
        }

        summary.innerHTML = `<p>Total games: ${games.length}</p>`;

        const playerStats = {};
        const commanderStats = {};
        const positionStats = {};

        games.forEach(game => {
          const winner = game.players.find(p => p.isWinner);
          game.players.forEach(player => {
            const playerKey = player.name;
            const commanderKey = player.commander;
            const positionKey = player.position;

            if (!playerStats[playerKey]) playerStats[playerKey] = { games: 0, wins: 0 };
            if (!commanderStats[commanderKey]) commanderStats[commanderKey] = { games: 0, wins: 0 };
            if (!positionStats[positionKey]) positionStats[positionKey] = { games: 0, wins: 0 };

            playerStats[playerKey].games += 1;
            commanderStats[commanderKey].games += 1;
            positionStats[positionKey].games += 1;

            if (winner && winner.name === player.name && winner.commander === player.commander && winner.position === player.position) {
              playerStats[playerKey].wins += 1;
              commanderStats[commanderKey].wins += 1;
              positionStats[positionKey].wins += 1;
            }
          });
        });

        tables.innerHTML = `
          ${renderStatsTable('Player Stats', playerStats)}
          ${renderStatsTable('Commander Stats', commanderStats)}
          ${renderStatsTable('Position Stats', positionStats)}
        `;
      }

      function renderStatsTable(title, stats) {
        const rows = Object.entries(stats)
          .sort((a, b) => b[1].wins - a[1].wins || b[1].games - a[1].games)
          .map(([key, value]) => `
            <tr>
              <td>${key}</td>
              <td>${value.games}</td>
              <td>${value.wins}</td>
              <td>${value.wins ? ((value.wins / value.games) * 100).toFixed(0) + '%' : '0%'}</td>
            </tr>
          `)
          .join('');

        return `
          <h3>${title}</h3>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Games</th>
                <th>Wins</th>
                <th>Win %</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      function resetCurrentGame() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('game-date').value = today;
        document.getElementById('player-first-name').value = '';
        document.getElementById('commander-first').value = '';
        document.getElementById('image-first').value = '';
        document.getElementById('player-second-name').value = '';
        document.getElementById('commander-second').value = '';
        document.getElementById('image-second').value = '';
        document.getElementById('player-third-name').value = '';
        document.getElementById('commander-third').value = '';
        document.getElementById('image-third').value = '';
        document.getElementById('player-last-name').value = '';
        document.getElementById('commander-last').value = '';
        document.getElementById('image-last').value = '';
        document.querySelector('input[name="winner"][value="first"]').checked = true;
        currentGame = { date: today, players: [], index: null };
        document.getElementById('edit-mode').style.display = 'none';
        document.getElementById('cancel-edit').style.display = 'none';
        ['first', 'second', 'third', 'last'].forEach(position => {
          updatePortraitPreview(position);
        });
      }

      window.addEventListener('load', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('game-date').value = today;
        currentGame.date = today;
        loadGames();

        ['first', 'second', 'third', 'last'].forEach(position => {
          const playerNameInput = document.getElementById(`player-${position}-name`);
          playerNameInput.addEventListener('input', () => {
            populateCommanderDataLists();
          });

          document.getElementById(`commander-${position}`).addEventListener('change', async () => {
  const commanderName =
    document.getElementById(`commander-${position}`).value.trim();

  if (
    commanderName &&
    !commanderImages[commanderName]
  ) {
    await fetchCommanderImage(commanderName);
    renderCommanderLibrary();
  }

  updatePortraitPreview(position);
});

          document.getElementById(`image-${position}`).addEventListener('change', event => {
            const file = event.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = e => {
                const commanderName = document.getElementById(`commander-${position}`).value.trim();
                pendingPortraits[position] = { commander: commanderName, data: e.target.result };
                if (commanderName) {
                  commanderImages[commanderName] = e.target.result;
                  saveCommanderImages();
                  renderCommanderLibrary();
                }
                updatePortraitPreview(position);
              };
              reader.readAsDataURL(file);
            }
          });
        });
      });

      document.getElementById('save-game').addEventListener('click', event => {
        event.preventDefault();

        const players = getSeatPlayers();
        const validPlayers = players.filter(p => p.name && p.commander);

        if (validPlayers.length < 1) {
          alert('Please enter at least 1 player with a name and commander.');
          return;
        }

        const winner = validPlayers.find(p => p.isWinner);
        if (!winner) {
          alert('Please select a winner from the players you entered.');
          return;
        }

        const game = {
          date: document.getElementById('game-date').value,
          players: validPlayers
        };

        validPlayers.forEach(player => {
          const seatMatch = Object.entries(pendingPortraits).find(([, value]) => value && value.commander === player.commander);
          if (seatMatch && !commanderImages[player.commander]) {
            commanderImages[player.commander] = seatMatch[1].data;
            saveCommanderImages();
            renderCommanderLibrary();
          }
        });

        if (currentGame.index != null) {
          games[currentGame.index] = game;
          currentGame.index = null;
        } else {
          games.push(game);
        }

        saveGames();
        populateDataLists();
        renderGameHistory();
        renderStats();
        resetCurrentGame();
      });

      document.getElementById('cancel-edit').addEventListener('click', event => {
        event.preventDefault();
        currentGame.index = null;
        resetCurrentGame();
      });

      document.getElementById('clear-game').addEventListener('click', event => {
        event.preventDefault();
        if (confirm('Clear all current entries for this game?')) {
          currentGame.index = null;
          resetCurrentGame();
        }
      });

      document.getElementById('game-history-list').addEventListener('click', event => {
        if (event.target.matches('.delete-game')) {
          const index = Number(event.target.dataset.index);
          if (confirm('Delete this game entry?')) {
            games.splice(index, 1);
            saveGames();
            populateDataLists();
            renderGameHistory();
            renderStats();
          }
        }

        if (event.target.matches('.edit-game')) {
          const index = Number(event.target.dataset.index);
          const game = games[index];
          currentGame.index = index;
          document.getElementById('game-date').value = game.date;
          game.players.forEach(player => {
            document.getElementById(`player-${player.position}-name`).value = player.name;
            document.getElementById(`commander-${player.position}`).value = player.commander;
            updatePortraitPreview(player.position);
          });
          const winner = game.players.find(p => p.isWinner);
          if (winner) {
            document.querySelector(`input[name="winner"][value="${winner.position}"]`).checked = true;
          }
          document.getElementById('edit-mode').textContent = 'Editing game entry';
          document.getElementById('edit-mode').style.display = 'block';
          document.getElementById('cancel-edit').style.display = 'inline-block';
        }
      });

      document.getElementById('commander-library').addEventListener('click', event => {
        if (event.target.matches('.delete-commander-image')) {
          const commanderName = event.target.dataset.commander;
          if (confirm(`Delete portrait for ${commanderName}?`)) {
            delete commanderImages[commanderName];
            saveCommanderImages();
            renderCommanderLibrary();
          }
        }
      });
    </script>
  </body>
</html>
